version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app:latest
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html:cached
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
    depends_on:
      - db

  db:
    image: mysql:8.1
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_crud
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
